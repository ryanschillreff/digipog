<!DOCTYPE html>
<html>
<head>
<title>the actual "game" part</title>
<style>
    body {
        margin: 0;
        font-family: "Comic Sans MS", "Comic Sans", cursive;
        background-color: #dbeafe;
        text-align: center;
    }

    h1 {
        color: #1e3a8a;
        background-color: #e0f2fe;
        border: 3px dashed #60a5fa;
        display: inline-block;
        padding: 8px;
        margin-top: 20px;
    }

    form {
        background-color: #ffffff;
        width: 320px;
        margin: 20px auto;
        padding: 20px;
        border: 4px solid #3b82f6;
    }

    section {
        margin-bottom: 15px;
        text-align: left;
    }

    label {
        color: #1f2937;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 6px;
        border: 2px solid #9ca3af;
        font-family: "Comic Sans MS", "Comic Sans", cursive;
        background-color: #f9fafb;
    }

    input:focus {
        background-color: #ffffff;
        border-color: #3b82f6;
    }

    button {
        width: 100%;
        padding: 10px;
        border: 3px solid #1f2937;
        background-color: #60a5fa;
        color: white;
        font-family: "Comic Sans MS", "Comic Sans", cursive;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background-color: #3b82f6;
    }
</style>
